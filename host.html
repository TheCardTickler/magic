<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Host</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; color:#fff; font-family:sans-serif; height:100vh; overflow:hidden; }
  #remote-video, #local-video { position:fixed; }
  #remote-video { width:100vw; height:100vh; object-fit:cover; top:0; left:0; z-index:0; background:#111; }
  #local-video  { width:100px; height:140px; object-fit:cover; bottom:20px; right:20px; z-index:10; border-radius:10px; border:2px solid #fff; }
  #status { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:20; text-align:center; font-size:16px; color:rgba(255,255,255,0.7); }
  #tap-btn { position:fixed; inset:0; z-index:30; background:rgba(0,0,0,0.85); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
  #tap-btn button { background:#ff9800; color:#fff; border:none; border-radius:50px; font-size:18px; font-weight:700; padding:18px 50px; cursor:pointer; }
</style>
</head>
<body>
<video id="remote-video" autoplay playsinline muted></video>
<video id="local-video" autoplay playsinline muted></video>
<div id="status">Starting...</div>

<div id="tap-btn">
  <div style="color:white;font-size:16px;">Brent — tap to activate</div>
  <button onclick="startHost()">Start</button>
</div>

<script>
const BRENT_PEER_ID = "magic-show-brent-2024";
let peer, localStream;

async function startHost() {
  document.getElementById("tap-btn").style.display = "none";
  document.getElementById("status").textContent = "Starting camera...";

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
    const lv = document.getElementById("local-video");
    lv.srcObject = localStream;
    await lv.play();
  } catch(e) {
    document.getElementById("status").textContent = "Camera error: " + e.message;
    return;
  }

  peer = new Peer(BRENT_PEER_ID, { debug:2 });

  peer.on("open", id => {
    document.getElementById("status").textContent = "Ready. Waiting for call...";
  });

  peer.on("call", async call => {
    document.getElementById("status").textContent = "Incoming call...";
    call.answer(localStream);
    call.on("stream", async remoteStream => {
      document.getElementById("status").textContent = "";
      const rv = document.getElementById("remote-video");
      rv.srcObject = remoteStream;
      try { await rv.play(); } catch(e) {}
    });
  });

  peer.on("error", err => {
    document.getElementById("status").textContent = "Error: " + err.type;
  });
}
</script>
</body>
</html>
