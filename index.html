<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>OmeTV</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#000; font-family:'Roboto',sans-serif; height:100vh; overflow:hidden; user-select:none; }

  #remote-video {
    width:100vw; height:100vh; object-fit:cover;
    position:fixed; top:0; left:0; z-index:0; background:#111;
  }
  #local-video {
    width:90px; height:120px; object-fit:cover;
    position:fixed; top:12px; right:12px; z-index:10;
    border-radius:10px; border:2px solid rgba(255,255,255,0.4);
  }

  #skip-flash {
    position:fixed; inset:0; z-index:25; background:#000;
    opacity:0; pointer-events:none; transition:opacity 0.1s;
  }
  #skip-flash.flash { opacity:1; }

  #controls {
    position:fixed; bottom:0; left:0; right:0; z-index:20;
    padding:12px 16px 28px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:linear-gradient(to top, rgba(0,0,0,0.65) 60%, transparent);
  }
  .ctrl-btn {
    border:none; cursor:pointer; border-radius:50px;
    font-family:'Roboto',sans-serif; font-weight:600;
    font-size:14px; padding:12px 0; flex:1;
  }
  #btn-stop { background:rgba(255,255,255,0.18); color:#fff; max-width:130px; }
  #btn-next { background:#ff9800; color:#fff; font-size:15px; max-width:200px; }

  #emoji-row {
    position:fixed; bottom:90px; left:0; right:0; z-index:20;
    display:flex; justify-content:space-around; padding:0 10px;
  }
  .emoji-btn { background:none; border:none; font-size:26px; cursor:pointer; }

  #flag-btn {
    position:fixed; top:12px; left:12px; z-index:20;
    background:none; border:none; color:rgba(255,255,255,0.5);
    font-size:22px; cursor:pointer; display:none;
  }

  /* OVERLAY */
  #overlay {
    position:fixed; inset:0; z-index:30;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:#1c1c1c; overflow:hidden;
  }

  /* Two avatar boxes */
  #avatar-row {
    display:flex; margin-bottom:18px; position:relative; z-index:1;
  }
  .avatar-box {
    width:100px; height:100px; background:#2a2a2a;
    display:flex; align-items:center; justify-content:center;
  }
  .avatar-box:first-child { border-radius:12px 0 0 12px; }
  .avatar-box:last-child  { border-radius:0 12px 12px 0; }
  .avatar-box svg { width:70px; height:70px; opacity:0.6; }

  #overlay-next-wrap {
    display:flex; align-items:center; gap:10px;
    margin-bottom:18px; position:relative; z-index:1;
  }
  #overlay-next-dot {
    width:34px; height:34px; border-radius:50%;
    background:rgba(255,255,255,0.15);
    display:flex; align-items:center; justify-content:center;
  }
  #overlay-next-dot::after {
    content:''; width:0; height:0;
    border-top:8px solid transparent; border-bottom:8px solid transparent;
    border-left:13px solid rgba(255,255,255,0.7); margin-left:3px;
  }
  #overlay-next-label { color:rgba(255,255,255,0.7); font-size:15px; font-weight:500; letter-spacing:1px; }

  #online-count { color:rgba(255,255,255,0.55); font-size:14px; position:relative; z-index:1; margin-bottom:6px; }

  #overlay-filters {
    position:absolute; bottom:28px; left:0; right:0;
    display:flex; gap:10px; padding:0 16px;
  }
  .filter-btn {
    flex:1; background:rgba(35,35,35,0.95); border:none; border-radius:10px;
    color:#fff; font-size:14px; font-weight:500; padding:14px 0; cursor:pointer;
  }

  #search-state {
    display:none; flex-direction:column;
    align-items:center; gap:14px; position:relative; z-index:1;
  }
  .spinner {
    width:44px; height:44px;
    border:3px solid rgba(255,255,255,0.12); border-top-color:#ff9800;
    border-radius:50%; animation:spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  #search-label { color:rgba(255,255,255,0.5); font-size:14px; }

  /* tap to unblock video */
  #video-unblock {
    position:fixed; inset:0; z-index:50;
    background:rgba(0,0,0,0.0);
    display:none;
  }
</style>
</head>
<body>

<video id="remote-video" autoplay playsinline></video>
<video id="local-video" autoplay playsinline muted></video>
<div id="skip-flash"></div>
<div id="video-unblock"></div>

<button id="flag-btn">⚑</button>

<div id="emoji-row" style="display:none">
  <button class="emoji-btn">❤️</button>
  <button class="emoji-btn">😂</button>
  <button class="emoji-btn">👍</button>
  <button class="emoji-btn">😊</button>
  <button class="emoji-btn">👌</button>
  <button class="emoji-btn">😍</button>
  <button class="emoji-btn">💬</button>
</div>

<div id="controls" style="display:none">
  <button class="ctrl-btn" id="btn-stop">Stop</button>
  <button class="ctrl-btn" id="btn-next">Next ▶</button>
</div>

<div id="overlay">
  <div id="start-state">
    <div id="avatar-row">
      <div class="avatar-box">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="35" r="18" stroke="#aaa" stroke-width="3" fill="none"/>
          <path d="M20 85 C20 60 80 60 80 85" stroke="#aaa" stroke-width="3" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="avatar-box">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="33" r="16" stroke="#888" stroke-width="3" fill="none"/>
          <path d="M22 85 C22 62 78 62 78 85" stroke="#888" stroke-width="3" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
    <div id="overlay-next-wrap">
      <div id="overlay-next-dot"></div>
      <div id="overlay-next-label">NEXT</div>
    </div>
    <div id="online-count">● 267,841 users online</div>
  </div>

  <div id="search-state">
    <div class="spinner"></div>
    <div id="search-label">Searching…</div>
  </div>

  <div id="overlay-filters">
    <button class="filter-btn" id="ov-btn-i-am">I AM 🙂</button>
    <button class="filter-btn" id="ov-btn-country">COUNTRY 🇺🇸</button>
  </div>
</div>

<script>
const BRENT_PEER_ID = "magic-show-brent-2024";
const FAKE_SKIPS = 2;

const overlay    = document.getElementById("overlay");
const startState = document.getElementById("start-state");
const searchState= document.getElementById("search-state");
const searchLabel= document.getElementById("search-label");
const flash      = document.getElementById("skip-flash");
const controls   = document.getElementById("controls");
const emojiRow   = document.getElementById("emoji-row");
const flagBtn    = document.getElementById("flag-btn");
const onlineEl   = document.getElementById("online-count");
const unblock    = document.getElementById("video-unblock");
const remoteVid  = document.getElementById("remote-video");
const localVid   = document.getElementById("local-video");

let peer, localStream, currentCall;
let skipsDone = 0, connected = false, started = false;

let baseCount = 267841;
setInterval(() => {
  baseCount += Math.floor(Math.random()*60)-30;
  onlineEl.textContent = "● " + baseCount.toLocaleString() + " users online";
}, 3000);

function showSearch(msg) {
  startState.style.display = "none";
  searchState.style.display = "flex";
  searchLabel.textContent = msg || "Searching…";
  overlay.style.display = "flex";
  controls.style.display = "none";
  emojiRow.style.display = "none";
  flagBtn.style.display = "none";
}

function showStart() {
  startState.style.display = "flex";
  searchState.style.display = "none";
  overlay.style.display = "flex";
  controls.style.display = "none";
  emojiRow.style.display = "none";
  flagBtn.style.display = "none";
}

function hideOverlay() {
  overlay.style.display = "none";
  controls.style.display = "flex";
  emojiRow.style.display = "flex";
  flagBtn.style.display = "block";
}

function doFlash(cb) {
  flash.classList.add("flash");
  setTimeout(() => { flash.classList.remove("flash"); cb && cb(); }, 130);
}

async function startCamera() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
    localVid.srcObject = localStream;
    await localVid.play();
    initPeer();
  } catch(e) {
    showSearch("Allow camera & mic to continue.");
  }
}

function initPeer() {
  peer = new Peer({ debug:0 });
  peer.on("open", () => showStart());
  peer.on("error", () => showSearch("Connection error."));
}

startState.addEventListener("click", () => {
  if (started) return;
  started = true;
  doFlash(() => { showSearch("Searching…"); runFakeSkips(); });
});

const skipDelays = [1900, 2300, 1700, 2100];

function runFakeSkips() {
  if (skipsDone >= FAKE_SKIPS) { connectToBrent(); return; }
  setTimeout(() => {
    doFlash(() => { skipsDone++; showSearch("Searching…"); setTimeout(runFakeSkips, 500); });
  }, skipDelays[skipsDone % skipDelays.length]);
}

async function connectToBrent() {
  showSearch("Connecting…");
  const call = peer.call(BRENT_PEER_ID, localStream);
  currentCall = call;

  const timeout = setTimeout(() => {
    showSearch("Searching…");
    setTimeout(connectToBrent, 3000);
  }, 12000);

  call.on("stream", async remoteStream => {
    clearTimeout(timeout);
    remoteVid.srcObject = remoteStream;

    // iOS Safari requires a user gesture to play — use invisible overlay tap
    unblock.style.display = "block";
    unblock.onclick = async () => {
      unblock.style.display = "none";
      try { await remoteVid.play(); } catch(e) {}
      connected = true;
      hideOverlay();
    };

    // Also try playing immediately (works if user already interacted)
    try {
      await remoteVid.play();
      unblock.style.display = "none";
      connected = true;
      hideOverlay();
    } catch(e) {
      // Need tap — unblock overlay is showing
    }
  });

  call.on("close", () => { connected=false; started=false; skipsDone=0; showStart(); });
  call.on("error", () => { clearTimeout(timeout); showSearch("Searching…"); setTimeout(connectToBrent, 3000); });
}

document.getElementById("btn-next").addEventListener("click", () => {
  if (connected) return;
  doFlash(() => showSearch("Searching…"));
});

document.getElementById("btn-stop").addEventListener("click", () => {
  if (currentCall) currentCall.close();
  connected=false; started=false; skipsDone=0; showStart();
});

document.getElementById("ov-btn-i-am").addEventListener("click", e => e.stopPropagation());
document.getElementById("ov-btn-country").addEventListener("click", e => e.stopPropagation());

// Start camera immediately
startCamera();
</script>
</body>
</html>
